<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Iframe Ultra</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        :root {
            --bg: #000000;
            --ui-panel: #0a0a0a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --border: #1a1a1a;
            --success: #00ff88;
            --error: #ff4444;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Zone de Rendu */
        #viewer-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }

        #viewer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #placeholder {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -380px;
            width: 360px;
            height: 100%;
            background: var(--ui-panel);
            border-right: 1px solid var(--border);
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 60px rgba(0,0,0,0.8);
        }

        .sidebar.open {
            transform: translateX(380px);
        }

        .sidebar-header {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Form Elements */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            background: #000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 12px;
            border-radius: 6px;
            resize: vertical;
            min-height: 140px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: #444;
        }

        /* Buttons */
        .btn {
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        /* History */
        .history-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            word-break: break-all;
            position: relative;
        }

        .history-item:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .history-item-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover .history-item-delete {
            opacity: 1;
        }

        .empty-state {
            color: #444;
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }

        /* Controls */
        .top-left-ctrl {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
        }

        .bottom-right-ctrl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1001;
            background: rgba(10, 10, 10, 0.8);
            padding: 12px 16px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Cast Button */
        google-cast-launcher {
            display: block !important;
            width: 24px !important;
            height: 24px !important;
            cursor: pointer;
            --connected-color: var(--success);
            --disconnected-color: white;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(10, 10, 10, 0.95);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            z-index: 2000;
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease;
            font-size: 13px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        /* Fullscreen */
        :fullscreen .top-left-ctrl,
        :fullscreen .bottom-right-ctrl {
            display: none;
        }

        :-webkit-full-screen .top-left-ctrl,
        :-webkit-full-screen .bottom-right-ctrl {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: -100vw;
                width: 100vw;
            }

            .sidebar.open {
                transform: translateX(100vw);
            }
        }

        /* Scrollbar */
        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Menu Toggle -->
    <div class="top-left-ctrl">
        <button class="icon-btn" onclick="app.toggleMenu()" title="Menu (M)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Configuration</h2>
        </div>

        <div class="sidebar-content">
            <!-- Code Input -->
            <div class="input-group">
                <label class="input-label">Code Iframe / Embed</label>
                <textarea id="codeInput" placeholder='<iframe src="https://..." width="100%" height="100%"></iframe>'></textarea>
            </div>

            <!-- Actions -->
            <div class="btn-group">
                <button class="btn btn-primary" onclick="app.applyCode()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Mettre à jour
                </button>
                <button class="btn btn-secondary" onclick="app.clearCode()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    Vider
                </button>
            </div>

            <!-- History -->
            <div class="history-section">
                <label class="input-label">Historique</label>
                <div id="historyContainer"></div>
            </div>
        </div>

        <div class="sidebar-footer">
            💾 Sauvegarde automatique dans le navigateur<br>
            ⌨️ Raccourcis : M (menu), F (plein écran), ESC (fermer)
        </div>
    </div>

    <!-- Viewer -->
    <div id="viewer-container">
        <div id="placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.3; margin-bottom: 12px;">
                <rect x="2" y="3" width="20" height="14" rx="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <div>Aucun contenu chargé</div>
            <div style="font-size: 11px; margin-top: 8px; opacity: 0.5;">Ouvrez le menu pour commencer</div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-right-ctrl">
        <google-cast-launcher id="castbutton"></google-cast-launcher>

        <button class="icon-btn" onclick="app.goFullscreen()" title="Plein écran (F)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>
    </div>

    <script>
        // Chromecast Initialization
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                const context = cast.framework.CastContext.getInstance();
                context.setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });
                console.log("✓ Chromecast initialisé");
            }
        };

        // Main App
        const app = {
            maxHistory: 5,

            init() {
                this.loadSavedCode();
                this.renderHistory();
                this.setupKeyboardShortcuts();
            },

            toggleMenu() {
                document.getElementById('sidebar').classList.toggle('open');
            },

            applyCode() {
                const code = document.getElementById('codeInput').value.trim();
                
                if (!code) {
                    this.showToast('Le code est vide', 'error');
                    return;
                }

                // Validation basique
                if (!code.includes('iframe') && !code.includes('embed')) {
                    this.showToast('Code invalide : doit contenir un iframe ou embed', 'error');
                    return;
                }

                const container = document.getElementById('viewer-container');
                container.innerHTML = code;

                const iframe = container.querySelector('iframe');
                if (iframe) {
                    iframe.style.width = "100%";
                    iframe.style.height = "100%";
                }

                this.saveCode(code);
                this.addToHistory(code);
                this.toggleMenu();
                this.showToast('Contenu chargé avec succès', 'success');
            },

            clearCode() {
                document.getElementById('codeInput').value = "";
                document.getElementById('viewer-container').innerHTML = `
                    <div id="placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.3; margin-bottom: 12px;">
                            <rect x="2" y="3" width="20" height="14" rx="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        <div>Aucun contenu chargé</div>
                        <div style="font-size: 11px; margin-top: 8px; opacity: 0.5;">Ouvrez le menu pour commencer</div>
                    </div>
                `;
                localStorage.removeItem('savedIframeCode');
                this.showToast('Code vidé', 'success');
            },

            goFullscreen() {
                const elem = document.getElementById('viewer-container');
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                }
            },

            saveCode(code) {
                localStorage.setItem('savedIframeCode', code);
            },

            loadSavedCode() {
                const savedCode = localStorage.getItem('savedIframeCode');
                if (savedCode) {
                    document.getElementById('codeInput').value = savedCode;
                    const container = document.getElementById('viewer-container');
                    container.innerHTML = savedCode;
                    
                    const iframe = container.querySelector('iframe');
                    if (iframe) {
                        iframe.style.width = "100%";
                        iframe.style.height = "100%";
                    }
                }
            },

            addToHistory(code) {
                let history = JSON.parse(localStorage.getItem('iframeHistory') || '[]');
                
                // Éviter les doublons
                history = history.filter(item => item.code !== code);
                
                // Ajouter au début
                history.unshift({
                    code: code,
                    timestamp: Date.now(),
                    preview: this.getCodePreview(code)
                });

                // Limiter l'historique
                if (history.length > this.maxHistory) {
                    history = history.slice(0, this.maxHistory);
                }

                localStorage.setItem('iframeHistory', JSON.stringify(history));
                this.renderHistory();
            },

            getCodePreview(code) {
                // Extraire l'URL du src si possible
                const srcMatch = code.match(/src=["']([^"']+)["']/);
                if (srcMatch) {
                    try {
                        const url = new URL(srcMatch[1]);
                        return url.hostname;
                    } catch (e) {
                        return srcMatch[1].substring(0, 50);
                    }
                }
                return code.substring(0, 50) + '...';
            },

            renderHistory() {
                const history = JSON.parse(localStorage.getItem('iframeHistory') || '[]');
                const container = document.getElementById('historyContainer');

                if (history.length === 0) {
                    container.innerHTML = '<div class="empty-state">Aucun historique</div>';
                    return;
                }

                container.innerHTML = history.map((item, index) => `
                    <div class="history-item" onclick="app.loadFromHistory(${index})">
                        ${item.preview}
                        <button class="history-item-delete" onclick="event.stopPropagation(); app.deleteFromHistory(${index})">✕</button>
                    </div>
                `).join('');
            },

            loadFromHistory(index) {
                const history = JSON.parse(localStorage.getItem('iframeHistory') || '[]');
                if (history[index]) {
                    document.getElementById('codeInput').value = history[index].code;
                    this.showToast('Code chargé depuis l\'historique', 'success');
                }
            },

            deleteFromHistory(index) {
                let history = JSON.parse(localStorage.getItem('iframeHistory') || '[]');
                history.splice(index, 1);
                localStorage.setItem('iframeHistory', JSON.stringify(history));
                this.renderHistory();
                this.showToast('Élément supprimé', 'success');
            },

            showToast(message, type = 'success') {
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.remove();
                }, 3000);
            },

            setupKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    // ESC : Fermer le menu
                    if (e.key === 'Escape') {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                    
                    // M : Toggle menu
                    if (e.key === 'm' || e.key === 'M') {
                        if (document.activeElement.tagName !== 'TEXTAREA') {
                            this.toggleMenu();
                        }
                    }
                    
                    // F : Fullscreen
                    if (e.key === 'f' || e.key === 'F') {
                        if (document.activeElement.tagName !== 'TEXTAREA') {
                            this.goFullscreen();
                        }
                    }
                });
            }
        };

        // Initialize app
        window.addEventListener('load', () => {
            app.init();
        });
    </script>
</body>
</html>
