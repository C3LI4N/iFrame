<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER | Minimal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&display=swap');
    body { font-family: 'Geist', sans-serif; background: #0a0a0a; color: #ededed; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
    #player-container:-webkit-full-screen { width: 100%; height: 100%; background: black; border-radius: 0; }
    #player-container:fullscreen { width: 100%; height: 100%; background: black; border-radius: 0; }
</style>
</head>
<body class="h-screen flex flex-col p-4 md:p-6 gap-6">

    <header class="flex items-center justify-between">
        <div class="flex items-center gap-6">
            <h1 class="text-xs font-semibold tracking-[0.3em] uppercase opacity-70">Aether</h1>
            <div id="clock" class="text-[9px] font-mono tracking-widest opacity-40">00:00:00</div>
        </div>
        <div class="flex gap-4">
            <button onclick="togglePanel()" class="text-[9px] tracking-widest uppercase hover:text-white opacity-60 transition">Injecter</button>
        </div>
    </header>

    <main class="flex-1 flex gap-6 overflow-hidden">
        <section id="player-container" class="flex-1 relative group bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center gap-2 opacity-30 text-[9px] tracking-[0.5em] uppercase">
                <span>Engine</span>
                <span id="status" class="opacity-50">Ready</span>
            </div>
            <div id="display-area" class="w-full h-full"></div>

            <div class="absolute bottom-6 right-6 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                <button onclick="document.getElementById('player-container').requestFullscreen()" class="glass px-4 py-2 rounded-full text-[9px] uppercase tracking-widest">Fullscreen</button>
                <button onclick="resetPlayer()" class="glass px-4 py-2 rounded-full text-[9px] uppercase tracking-widest text-red-400/80">Reset</button>
            </div>
        </section>
    </main>

    <div id="sidePanel" class="fixed inset-y-0 right-0 w-full md:w-96 glass p-8 transform translate-x-full transition-transform z-50">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-[10px] uppercase tracking-widest opacity-60">Source Configuration</h2>
            <button onclick="togglePanel()" class="opacity-50 hover:opacity-100">✕</button>
        </div>
        <textarea id="mainInput" class="w-full h-40 bg-white/5 border border-white/10 rounded-2xl p-4 text-xs focus:outline-none focus:border-white/30 transition" placeholder="URL ou iframe..."></textarea>
        <button onclick="processInput()" class="w-full mt-4 bg-white text-black py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/90 transition">Charger le stream</button>
    </div>

    <script>
        setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR'), 1000);
        function togglePanel() { document.getElementById('sidePanel').classList.toggle('translate-x-full'); }

        function processInput() {
            const input = document.getElementById('mainInput').value.trim();
            if(!input) return;
            const src = input.includes('<iframe') ? (input.match(/src=["']([^"']+)["']/)||[])[1] : input;
            const container = document.getElementById('display-area');
            document.getElementById('placeholder').style.display = 'none';
            container.innerHTML = `<iframe src="${src}" class="w-full h-full" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
            document.getElementById('status').innerText = "Live";
            togglePanel();
        }

        function resetPlayer() {
            document.getElementById('display-area').innerHTML = '';
            document.getElementById('placeholder').style.display = 'flex';
            document.getElementById('status').innerText = "Ready";
        }
    </script>
</body>
</html>
