<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Iframe Ultra</title>
    
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

    <style>
        :root {
            --bg: #000000;
            --ui-panel: #111111;
            --text: #ffffff;
            --accent: #ffffff;
            --border: #222222;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Zone de Rendu (Le Lecteur) */
        #viewer-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1;
        }

        #viewer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Sidebar Coulissante */
        .sidebar {
            position: fixed;
            top: 0; left: -350px;
            width: 320px;
            height: 100%;
            background: var(--ui-panel);
            border-right: 1px solid var(--border);
            z-index: 1000; /* Toujours au dessus sauf en plein écran */
            transition: transform 0.3s ease;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .sidebar.open { transform: translateX(350px); }

        /* Inputs & Boutons */
        textarea {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            color: #aaa;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            resize: none;
            outline: none;
            margin-bottom: 20px;
        }

        .btn-main {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .btn-secondary {
            background: transparent;
            color: #666;
            border: 1px solid #333;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Contrôles Flottants */
        .top-left-ctrl {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1001;
        }

        .bottom-right-ctrl {
            position: fixed;
            bottom: 20px; right: 20px;
            display: flex;
            gap: 15px;
            z-index: 1001;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .icon-btn:hover { opacity: 1; }

        /* Masquer les contrôles en mode plein écran natif */
        :fullscreen .top-left-ctrl, :fullscreen .bottom-right-ctrl { display: none; }
        :-webkit-full-screen .top-left-ctrl, :-webkit-full-screen .bottom-right-ctrl { display: none; }

google-cast-launcher {
    display: block !important;
    width: 32px !important;
    height: 32px !important;
    cursor: pointer;
    /* Supprime la couleur grise pour laisser l'icône native apparaître */
    background-color: transparent; 

    </style>
</head>
<body>

    <div class="top-left-ctrl">
        <button class="icon-btn" onclick="toggleMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-top:0">Configuration</h3>
        <textarea id="codeInput" placeholder="Collez votre code iframe ici..."></textarea>
        <button class="btn-main" onclick="applyCode()">METTRE À JOUR</button>
        <button class="btn-secondary" onclick="clearCode()">VIDER LE CODE</button>
        <p style="font-size: 10px; color: #444; margin-top: 20px;">Le code est sauvegardé automatiquement sur ce navigateur.</p>
    </div>

    <div id="viewer-container">
        <div id="placeholder" style="color: #333;">Aucun contenu chargé</div>
    </div>

    <div class="bottom-right-ctrl">
        <google-cast-launcher id="castbutton"></google-cast-launcher>

        <button class="icon-btn" onclick="goFullscreen()" title="Plein écran">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>
    </div>

    <script>
       // Remplace toute la partie Chromecast par ceci
window['__onGCastApiAvailable'] = function(isAvailable) {
    if (isAvailable) {
        const context = cast.framework.CastContext.getInstance();
        context.setOptions({
            receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
            autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });
        console.log("Chromecast : Prêt et initialisé");
    }
};

        function initializeCastApi() {
            cast.framework.CastContext.getInstance().setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
        };

        // Gestion de la Sidebar
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Appliquer le code et sauvegarder
        function applyCode() {
            const code = document.getElementById('codeInput').value;
            const container = document.getElementById('viewer-container');
            
            if (code.trim() !== "") {
                container.innerHTML = code;
                const iframe = container.querySelector('iframe');
                if (iframe) {
                    iframe.style.width = "100%";
                    iframe.style.height = "100%";
                }
                localStorage.setItem('savedIframeCode', code);
                toggleMenu();
            }
        }

        // Vider le code
        function clearCode() {
            document.getElementById('codeInput').value = "";
            document.getElementById('viewer-container').innerHTML = '<div style="color: #333;">Aucun contenu chargé</div>';
            localStorage.removeItem('savedIframeCode');
        }

        // Plein écran (Cible uniquement le container pour cacher l'UI)
        function goFullscreen() {
            const elem = document.getElementById('viewer-container');
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        // Charger le code sauvegardé au démarrage
        window.onload = function() {
            const savedCode = localStorage.getItem('savedIframeCode');
            if (savedCode) {
                document.getElementById('codeInput').value = savedCode;
                applyCode();
            }
        }

        // Fermer le menu avec Echap
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") document.getElementById('sidebar').classList.remove('open');
        });
// Variable pour empêcher la boucle d'actualisation
let isInitialLoad = true;

function applyCode() {
    const code = document.getElementById('codeInput').value;
    const container = document.getElementById('viewer-container');
    
    if (code.trim() !== "") {
        // On ne remplace le HTML que si le code a vraiment changé
        if (container.innerHTML !== code) {
            container.innerHTML = code;
            const iframe = container.querySelector('iframe');
            if (iframe) {
                iframe.style.width = "100%";
                iframe.style.height = "100%";
            }
        }
        
        localStorage.setItem('savedIframeCode', code);
        
        // Ferme le menu seulement si ce n'est pas le chargement initial
        if (!isInitialLoad) {
            toggleMenu();
        }
        isInitialLoad = false;
    }
}

// Remplace ton window.onload par celui-ci
window.addEventListener('load', function() {
    const savedCode = localStorage.getItem('savedIframeCode');
    if (savedCode) {
        document.getElementById('codeInput').value = savedCode;
        applyCode();
    }
});
    </script>
</body>
</html>
